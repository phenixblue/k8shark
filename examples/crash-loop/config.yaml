# k8shark capture config — crash-loop example
#
# Run with:  kshrk capture --config examples/crash-loop/config.yaml
# See:       examples/crash-loop/README.md

duration: 30s
output: ./capture.kshrk

resources:
  - group: ""
    version: v1
    resource: pods
    namespaces: [crash-demo]
    interval: 10s
    logs: 50 # tail lines to capture from the current container
    previousLogs: true # also capture the terminated previous container's log

  - group: apps
    version: v1
    resource: deployments
    namespaces: [crash-demo]
    interval: 15s

  - group: ""
    version: v1
    resource: events
    namespaces: [crash-demo]
    interval: 10s
    dedup: false # keep every event, not just the first occurrence
