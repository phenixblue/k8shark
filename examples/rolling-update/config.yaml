# k8shark capture config — rolling-update example
#
# Run with:  kshrk capture --config examples/rolling-update/config.yaml
# (trigger a rollout partway through — see README.md)

duration: 90s
output: ./examples/rolling-update/capture.kshrk

resources:
  - group: ""
    version: v1
    resource: pods
    namespaces: [rollout-demo]
    interval: 5s
    watch: true # precise ADDED/MODIFIED/DELETED events for `kshrk transitions`

  - group: apps
    version: v1
    resource: deployments
    namespaces: [rollout-demo]
    interval: 5s
    watch: true

  - group: apps
    version: v1
    resource: replicasets
    namespaces: [rollout-demo]
    interval: 5s
    watch: true

  - group: ""
    version: v1
    resource: events
    namespaces: [rollout-demo]
    interval: 5s
    dedup: false
