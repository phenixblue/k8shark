# k8shark capture config — basic-workloads example
#
# Run with:  kshrk capture --config examples/basic-workloads/config.yaml
# See:       examples/basic-workloads/README.md

duration: 45s
output: ./capture.kshrk

resources:
  - group: ""
    version: v1
    resource: pods
    namespaces: [basic-demo]
    interval: 15s

  - group: apps
    version: v1
    resource: deployments
    namespaces: [basic-demo]
    interval: 15s

  - group: ""
    version: v1
    resource: services
    namespaces: [basic-demo]
    interval: 30s

  - group: ""
    version: v1
    resource: nodes # cluster-scoped: no namespaces field
    interval: 30s
