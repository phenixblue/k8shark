# k8shark capture config
#
# Run with:  kshrk capture --config examples/k8shark.yaml
# See also:  docs/config.md for full field reference and more examples

# How long to run the capture. Polling continues until time runs out.
duration: 10m

# Output archive path. Defaults to ./k8shark-<timestamp>.tar.gz if omitted.
output: ./capture.tar.gz

# Path to kubeconfig for the source cluster.
# Defaults to $KUBECONFIG env, then ~/.kube/config.
# kubeconfig: ~/.kube/config

resources:
  # ── Core workloads ───────────────────────────────────────────────────────────

  - group: ""
    version: v1
    resource: pods
    namespaces: [default, kube-system]
    interval: 30s

  - group: ""
    version: v1
    resource: nodes          # cluster-scoped: no namespaces field
    interval: 60s

  - group: ""
    version: v1
    resource: events
    namespaces: [default]
    interval: 10s

  # ── Controllers ──────────────────────────────────────────────────────────────

  - group: apps
    version: v1
    resource: deployments
    namespaces: [default]
    interval: 30s

  - group: apps
    version: v1
    resource: daemonsets
    namespaces: [default, kube-system]
    interval: 60s

  - group: apps
    version: v1
    resource: statefulsets
    namespaces: [default]
    interval: 30s

  # ── Jobs ─────────────────────────────────────────────────────────────────────

  - group: batch
    version: v1
    resource: jobs
    namespaces: [default]
    interval: 30s

  # ── Networking ───────────────────────────────────────────────────────────────

  - group: ""
    version: v1
    resource: services
    namespaces: [default]
    interval: 60s

  # ── Storage ──────────────────────────────────────────────────────────────────

  - group: ""
    version: v1
    resource: persistentvolumeclaims
    namespaces: [default]
    interval: 30s

  - group: ""
    version: v1
    resource: persistentvolumes  # cluster-scoped: no namespaces field
    interval: 60s

  - group: storage.k8s.io
    version: v1
    resource: storageclasses     # cluster-scoped: no namespaces field
    interval: 60s
