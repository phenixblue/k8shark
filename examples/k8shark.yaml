# k8shark capture config
#
# Run with:  kshrk capture --config examples/k8shark.yaml
# See also:  docs/config.md for full field reference and more examples

# How long to run the capture. Polling continues until time runs out.
duration: 10m

# Output archive path. Defaults to ./k8shark-<timestamp>.khsrk if omitted.
output: ./capture.khsrk

# Path to kubeconfig for the source cluster.
# Defaults to $KUBECONFIG env, then ~/.kube/config.
# kubeconfig: ~/.kube/config

# Web UI ("kshrk ui") server ports. Omit or "0" for a random free port; set
# these to pin consistent ports across runs. The --port / --api-port CLI flags
# override these when provided.
# ui:
#   port: "8080"       # local web UI
#   api_port: "8081"   # mock Kubernetes API server

resources:
  # ── Core workloads ───────────────────────────────────────────────────────────

  - group: ""
    version: v1
    resource: pods
    namespaces: ["*"]          # capture pods from ALL namespaces
    interval: 30s

  - group: ""
    version: v1
    resource: nodes          # cluster-scoped: no namespaces field
    interval: 60s

  - group: ""
    version: v1
    resource: events
    namespaces: ["*"]
    interval: 10s

  # ── Controllers ──────────────────────────────────────────────────────────────

  - group: apps
    version: v1
    resource: deployments
    namespaces: ["*"]
    interval: 30s

  - group: apps
    version: v1
    resource: daemonsets
    namespaces: ["*"]
    interval: 60s

  - group: apps
    version: v1
    resource: statefulsets
    namespaces: ["*"]
    interval: 30s

  # ── Jobs ─────────────────────────────────────────────────────────────────────

  - group: batch
    version: v1
    resource: jobs
    namespaces: ["*"]
    interval: 30s

  # ── Networking ───────────────────────────────────────────────────────────────

  - group: ""
    version: v1
    resource: services
    namespaces: ["*"]
    interval: 60s

  # ── Storage ──────────────────────────────────────────────────────────────────

  - group: ""
    version: v1
    resource: persistentvolumeclaims
    namespaces: ["*"]
    interval: 30s

  - group: ""
    version: v1
    resource: persistentvolumes  # cluster-scoped: no namespaces field
    interval: 60s

  - group: storage.k8s.io
    version: v1
    resource: storageclasses     # cluster-scoped: no namespaces field
    interval: 60s
